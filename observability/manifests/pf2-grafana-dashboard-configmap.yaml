# Grafana 대시보드를 "코드로" 관리하는 방법 - ConfigMap에 대시보드 JSON을 담아두면
# kube-prometheus-stack이 같이 설치한 sidecar 컨테이너가 이 라벨(grafana_dashboard: "1")이
# 붙은 ConfigMap을 자동으로 찾아서 Grafana 안에 대시보드로 등록해준다.
# (웹 UI에서 클릭으로 만드는 대신 이 파일 자체가 "대시보드의 소스코드"가 되는 것 - GitOps와 같은 발상)
apiVersion: v1
kind: ConfigMap
metadata:
  name: pf2-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  pf2-dashboard.json: |
    {
      "title": "PF2 Overview",
      "uid": "pf2-overview",
      "timezone": "browser",
      "refresh": "15s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "요청 처리율 (req/s, 5분 평균)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "sum(rate(pf2_requests_total[5m]))", "legendFormat": "requests/sec" }
          ]
        },
        {
          "id": 2,
          "title": "살아있는 PF2 인스턴스 수",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "sum(up{job=\"pf2-svc\"})", "legendFormat": "up" }
          ]
        },
        {
          "id": 3,
          "title": "누적 요청 수 (전체 파드 합산)",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "sum(pf2_requests_total)", "legendFormat": "total" }
          ]
        },
        {
          "id": 4,
          "title": "파드별 요청 수",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            { "expr": "pf2_requests_total", "legendFormat": "{{pod}}" }
          ]
        }
      ]
    }
