apiVersion: batch/v1
kind: CronJob
metadata:
  name: cj-date
spec:
  schedule: "*/1 * * * *"
  successfulJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: date
            image: busybox:1.36
            command: ["sh", "-c", "date"]
          restartPolicy: OnFailure
