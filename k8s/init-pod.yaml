# init container мӢӨмҠө вҖ” initмқҙ лҒқлӮҳм•ј(exit 0) main(nginx)мқҙ мӢңмһ‘лҗңлӢӨ
apiVersion: v1
kind: Pod
metadata:
  name: init-pod
spec:
  initContainers:
  - name: wait-something
    image: busybox
    command: ["sh", "-c", "echo init мһ‘м—… мӢңмһ‘; sleep 10; echo init мҷ„лЈҢ"]
  containers:
  - name: main
    image: nginx
    ports:
    - containerPort: 80
