# events 블록: nginx 워커 프로세스의 연결 처리 방식 설정
# 비워두면 기본값 적용 (worker_connections 1024) — 개발·데모 환경에서는 충분
events {}

http {
    # upstream: 트래픽을 전달할 백엔드 서버 그룹 정의
    # 'app'은 docker-compose에서 정의한 서비스 이름 — 도커 내부 DNS가 자동 해석
    # 여러 서버를 나열하면 nginx가 자동으로 라운드로빈 로드밸런싱
    upstream app {
        server app:8080;      # app 컨테이너의 8080 포트로 요청 전달
    }

    server {
        listen 80;            # 외부에서 들어오는 80 포트(HTTP) 요청 수신

        location / {
            # 들어온 모든 요청을 upstream 'app' 그룹으로 프록시
            # proxy_pass: 리버스프록시의 핵심 — 클라이언트는 nginx만 보고, 백엔드는 숨겨짐
            proxy_pass http://app;
        }
    }
}
